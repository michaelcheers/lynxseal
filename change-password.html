<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Change Password</title>
<!-- Fonts: SW-proxied, SRI-pinned woff2 (see wrapper sw.js). Never a font CDN
     <link>. Bare portal (no SW) → /__fonts.css 404s → system-font fallback. -->
<link rel="stylesheet" href="/__fonts.css">
<link rel="stylesheet" href="/css/auth.css">
<link rel="stylesheet" href="/css/lynxseal.css">
<script src="/js/config.js"></script>
<script src="/js/portal-bridge.js?v=2"></script>
<script src="/js/api.js"></script>
</head>
<body class="lang-en">

<header class="topbar">
  <a class="wordmark" id="tenantWordmark" href="/" aria-label="Home">
    <img id="tenantLogo" src="/logo.svg" alt="LynxSeal">
  </a>
  <span class="vr"></span>
  <span class="breadcrumb">Change password</span>
  <span class="vr powered-sep" hidden></span>
  <a class="powered-by" href="https://lynxseal.com" target="_blank" rel="noopener" hidden>
    Powered by <img src="/logo.svg" alt="LynxSeal" class="powered-logo">
  </a>
</header>

<main class="auth-stage">
<div class="card auth-card">
  <div class="eyebrow" style="margin-bottom:8px">Account</div>
  <h2 class="display-md">Change your password</h2>
  <p class="sub">Enter your current password and choose a new one.</p>
  <form id="cpForm">
    <div class="field">
      <label class="label" for="oldPw">Old password</label>
      <input id="oldPw" name="oldPassword" type="password" class="ctrl" required
        pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)[a-zA-Z\d\w\W]{8,}$">
    </div>
    <div class="field">
      <label class="label" for="newPw">New password</label>
      <input id="newPw" name="password" type="password" class="ctrl" required
        pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)[a-zA-Z\d\w\W]{8,}$">
    </div>
    <div class="field">
      <label class="label" for="confirmPw">Confirm password</label>
      <input id="confirmPw" type="password" class="ctrl" required>
    </div>
    <div id="wrongOld" class="alert alert-danger" style="display:none">Password incorrect.</div>
    <button class="btn accent lg block" type="submit">Change password</button>
  </form>
</div>
</main>
<script src="/js/ui-shell.js?v=2"></script>
<script>
document.getElementById('cpForm').addEventListener('submit', async e => {
  e.preventDefault();
  document.getElementById('wrongOld').style.display = 'none';
  if (newPw.value !== confirmPw.value) { alert('Passwords do not match'); return; }
  try {
    const r = await api.post('/api/change-password', { oldPassword: oldPw.value, password: newPw.value });
    if (r.error === 'wrong-old-password') { document.getElementById('wrongOld').style.display = ''; return; }
    if (r.ok) { location.href = '/'; return; }
    alert('Unexpected response: ' + JSON.stringify(r));
  } catch (e) { alert(e.message || e); }
});
</script>
</body>
</html>
