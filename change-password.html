<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Change Password</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha256-YLGeXaapI0/5IgZopewRJcFXomhRMlYYjugPLSyNjTY=" crossorigin="anonymous" referrerpolicy="no-referrer">
<link rel="stylesheet" href="/css/site.css">
<link rel="stylesheet" href="/css/lynxseal.css">
<script src="/js/config.js"></script>
<script src="/js/portal-bridge.js"></script>
<script src="/js/api.js"></script>
</head>
<body>
<main>
<div class="col-md-8 mx-auto">
  <form id="cpForm">
    <div class="form-group">
      <label for="oldPw">Old Password</label>
      <input id="oldPw" name="oldPassword" type="password" class="form-control" required
        pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)[a-zA-Z\d\w\W]{8,}$">
    </div>
    <div class="form-group">
      <label for="newPw">New Password</label>
      <input id="newPw" name="password" type="password" class="form-control" required
        pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)[a-zA-Z\d\w\W]{8,}$">
    </div>
    <div class="form-group">
      <label for="confirmPw">Confirm Password</label>
      <input id="confirmPw" type="password" class="form-control" required>
    </div>
    <div id="wrongOld" class="alert alert-danger" style="display:none">Password incorrect</div>
    <button class="btn btn-primary" type="submit">Change Password</button>
  </form>
</div>
</main>
<script>
document.getElementById('cpForm').addEventListener('submit', async e => {
  e.preventDefault();
  document.getElementById('wrongOld').style.display = 'none';
  if (newPw.value !== confirmPw.value) { alert('Passwords do not match'); return; }
  try {
    const r = await api.post('/api/change-password', { oldPassword: oldPw.value, password: newPw.value });
    if (r.error === 'wrong-old-password') { document.getElementById('wrongOld').style.display = ''; return; }
    if (r.ok) { location.href = '/'; return; }
    alert('Unexpected response: ' + JSON.stringify(r));
  } catch (e) { alert(e.message || e); }
});
</script>
</body>
</html>
