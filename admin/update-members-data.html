<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Update Members Data · Admin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha256-YLGeXaapI0/5IgZopewRJcFXomhRMlYYjugPLSyNjTY=" crossorigin="anonymous" referrerpolicy="no-referrer">
<link rel="stylesheet" href="/css/lynxseal.css">
<script src="/js/config.js"></script>
<script src="/js/portal-bridge.js"></script>
<script src="/js/api.js"></script>
</head>
<body>
<main style="padding:2em">
<form id="form" enctype="multipart/form-data">
  <label class="form-group">
    <b>Import Data (Membee CSV)</b><br>
    <input type="file" name="userInfo" accept=".csv" required class="form-control" style="margin-left:2em">
  </label><br>
  <label class="form-group">
    <b>Import Type</b><br>
    <select name="phoneNumbersOnly" required style="margin-left:2em" class="form-control">
      <option selected disabled value=""></option>
      <option value="false">Member Data</option>
      <option value="true">Phone Numbers</option>
    </select>
  </label><br>
  <div id="result" class="alert alert-success" style="display:none;white-space:pre-line"></div>
  <button class="btn btn-primary" type="submit">Import User Info</button>
</form>
</main>
<script>
document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  try {
    // FormData → multipart POST. api.post handles FormData passthrough.
    const r = await api.post('/api/admin/update-members-data', new FormData(e.target));
    const div = document.getElementById('result');
    div.style.display = '';
    if ('phoneNumbersUpdated' in r) {
      div.textContent = `Phone Numbers Updated: ${r.phoneNumbersUpdated}`;
    } else {
      div.textContent = [
        `New Members (not certified): ${r.newMembersNoAccess}`,
        `New Members (certified): ${r.newMembersAccess}`,
        `Members Newly Certified: ${r.accessGranted}`,
        `Members Newly Uncertified: ${r.accessRevoked}`,
        `Certified Members with Email Changed: ${r.emailChanged}`,
        `Certified Members with Language Pair(s) Added: ${r.languagePairsAdded}`,
        '(Operations listed above are mutually exclusive except Email Changed + Language Pairs Added)',
      ].join('\n');
    }
  } catch (e) { alert(e.message || e); }
});
</script>
</body>
</html>
