<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Remove User · Admin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha256-YLGeXaapI0/5IgZopewRJcFXomhRMlYYjugPLSyNjTY=" crossorigin="anonymous" referrerpolicy="no-referrer">
<link rel="stylesheet" href="/css/lynxseal.css">
<script src="/js/config.js"></script>
<script src="/js/portal-bridge.js"></script>
<script src="/js/api.js"></script>
</head>
<body>
<main style="padding:2em">
  <h1>Remove a User</h1>
  <br>
  <form id="form">
    <div class="form-group">
      <label for="memberNumber">Member Number</label>
      <select class="form-control" id="memberNumber" name="memberNumber"></select>
    </div>
    <div id="result" style="display:none"></div>
    <div class="alert alert-primary">
      Note: Members' access is automatically revoked when using the Update Members Data utility.<br>
      This utility is only for exceptional cases (account hacked, misconduct, etc.).
    </div>
    <button class="btn btn-primary" type="submit">Revoke Access</button>
  </form>
</main>
<script>
// We don't have a list endpoint yet; expose a free-text input as fallback.
// (Pre-populating would need a /api/admin/list-members endpoint — TODO.)
const sel = document.getElementById('memberNumber');
const input = document.createElement('input');
input.type = 'text'; input.className = 'form-control'; input.name = 'memberNumber'; input.required = true;
sel.replaceWith(input);

document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  try {
    const r = await api.post('/api/admin/remove-user', { memberNumber: input.value });
    const div = document.getElementById('result');
    div.style.display = '';
    div.className = r.ok ? 'alert alert-success' : 'alert alert-danger';
    div.textContent = r.ok
      ? `${r.memberNumber} successfully had their access revoked.`
      : 'Error: Member does not have digital signature access.';
  } catch (e) { alert(e.message || e); }
});
</script>
</body>
</html>
