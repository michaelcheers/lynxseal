<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Error</title>
<!-- Fonts: SW-proxied, SRI-pinned woff2 (see wrapper sw.js). Never a font CDN
     <link>. Bare portal (no SW) → /__fonts.css 404s → system-font fallback. -->
<link rel="stylesheet" href="/__fonts.css">
<link rel="stylesheet" href="/css/auth.css">
<link rel="stylesheet" href="/css/lynxseal.css">
</head>
<body class="lang-en">

<header class="topbar">
  <a class="wordmark" id="tenantWordmark" href="/" aria-label="Home">
    <img id="tenantLogo" src="/logo.svg" alt="LynxSeal">
  </a>
  <span class="vr"></span>
  <span class="breadcrumb">Error</span>
</header>

<main class="auth-stage">
<div class="card auth-card">
  <div class="eyebrow" style="margin-bottom:8px;color:var(--accent)">Error</div>
  <h2 class="display-md">Something went wrong</h2>
  <p class="sub">An error occurred while processing your request.</p>
  <p id="errorMessage" class="alert alert-danger" style="display:none"><b>Error message:</b> <span id="errorText"></span></p>
  <p><a href="/">Back to home</a></p>
</div>
</main>
<!-- error.html intentionally has no JS deps beyond the inline handler; add the
     branding shim so the logo matches when the SW is present. -->
<script src="/js/config.js"></script>
<script src="/js/portal-bridge.js"></script>
<script src="/js/ui-shell.js?v=2"></script>
<script>
const err = new URLSearchParams(location.search).get('msg');
if (err) {
  document.getElementById('errorMessage').style.display = '';
  document.getElementById('errorText').textContent = err;
}
</script>
</body>
</html>
