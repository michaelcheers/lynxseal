<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Enter OTP Code</title>
<!-- Fonts: SW-proxied, SRI-pinned woff2 (see wrapper sw.js). Never a font CDN
     <link>. Bare portal (no SW) → /__fonts.css 404s → system-font fallback. -->
<link rel="stylesheet" href="/__fonts.css">
<link rel="stylesheet" href="/css/auth.css">
<link rel="stylesheet" href="/css/lynxseal.css">
<script src="/js/config.js"></script>
<script src="/js/portal-bridge.js?v=2"></script>
<script src="/js/api.js"></script>
</head>
<body class="lang-en">

<header class="topbar">
  <a class="wordmark" id="tenantWordmark" href="/" aria-label="Home">
    <img id="tenantLogo" src="/logo.svg" alt="LynxSeal">
  </a>
  <span class="vr"></span>
  <span class="breadcrumb">Verification code</span>
  <span class="vr powered-sep" hidden></span>
  <a class="powered-by" href="https://lynxseal.com" target="_blank" rel="noopener" hidden>
    Powered by <img src="/logo.svg" alt="LynxSeal" class="powered-logo">
  </a>
</header>

<main class="auth-stage">
<div class="card auth-card">
  <div class="eyebrow" style="margin-bottom:8px">Verification</div>
  <h2 class="display-md">Enter your code</h2>
  <p class="sub">Enter the verification code we sent you.</p>
  <form id="otpForm">
    <div class="field">
      <label class="label" for="codeI">Code</label>
      <input id="codeI" name="code" class="ctrl mono" required
        pattern="^[a-zA-Z0-9]{6,10}$"
        title="An OTP Code is a 6-10 character alphanumeric code.">
    </div>
    <div id="badCode" class="alert alert-danger" style="display:none">OTP code not recognized.</div>
    <button class="btn accent lg block" type="submit">Verify code</button>
  </form>
</div>
</main>
<script src="/js/ui-shell.js?v=2"></script>
<script>
const otpId = new URLSearchParams(location.search).get('id') || location.pathname.replace(/^\/verify-otp-code\//, '').replace(/\.html$/, '');
document.getElementById('otpForm').addEventListener('submit', async e => {
  e.preventDefault();
  document.getElementById('badCode').style.display = 'none';
  const fd = new FormData(e.target);
  try {
    const r = await api.post('/api/verify-otp-code', { otpId, code: fd.get('code') });
    if (r.error === 'bad-code') { document.getElementById('badCode').style.display = ''; return; }
    if (r.needsPasswordChange) { location.href = '/verify.html?code=' + encodeURIComponent(r.activationCode); return; }
    if (r.ok) {
      if (r.token) window.PortalBridge.setAuth(r.token, !!r.isAdmin);
      location.href = r.redirectTo || '/';
      return;
    }
    alert('Unexpected response: ' + JSON.stringify(r));
  } catch (e) { alert(e.message || e); }
});
</script>
</body>
</html>
