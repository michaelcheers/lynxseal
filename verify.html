<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verify</title>
<!-- Fonts: SW-proxied, SRI-pinned woff2 (see wrapper sw.js). Never a font CDN
     <link>. Bare portal (no SW) → /__fonts.css 404s → system-font fallback. -->
<link rel="stylesheet" href="/__fonts.css">
<link rel="stylesheet" href="/css/auth.css">
<link rel="stylesheet" href="/css/lynxseal.css">
<script src="/js/config.js"></script>
<script src="/js/portal-bridge.js?v=2"></script>
<script src="/js/api.js"></script>
</head>
<body class="lang-en">

<header class="topbar">
  <a class="wordmark" id="tenantWordmark" href="/" aria-label="Home">
    <img id="tenantLogo" src="/logo.svg" alt="LynxSeal">
  </a>
  <span class="vr"></span>
  <span class="breadcrumb">Account activation</span>
  <span class="vr powered-sep" hidden></span>
  <a class="powered-by" href="https://lynxseal.com" target="_blank" rel="noopener" hidden>
    Powered by <img src="/logo.svg" alt="LynxSeal" class="powered-logo">
  </a>
</header>

<main class="auth-stage">
<div class="card auth-card">
  <div id="loadingMsg" style="text-align:center">
    <div class="spinner"></div>
    <p class="meta">Verifying…</p>
  </div>
  <form id="pwForm" style="display:none">
    <div class="eyebrow" style="margin-bottom:8px">Account</div>
    <h2 class="display-md">Choose a password</h2>
    <p class="sub">Set a password to finish activating your account.</p>
    <div class="field">
      <label class="label" for="pw1">Password</label>
      <input id="pw1" type="password" name="password" class="ctrl" required
        pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)[a-zA-Z\d\w\W]{8,}$"
        title="Password must be at least 8 characters and contain uppercase, lowercase, and a number.">
    </div>
    <div class="field">
      <label class="label" for="pw2">Confirm password</label>
      <input id="pw2" type="password" class="ctrl" required>
    </div>
    <div class="field check-row">
      <input type="checkbox" name="rememberMe" id="rememberMe">
      <label for="rememberMe">Remember me</label>
    </div>
    <button class="btn accent lg block" type="submit">Set password</button>
  </form>
  <div id="errorMsg" class="alert alert-danger" style="display:none"></div>
</div>
</main>
<script src="/js/ui-shell.js?v=2"></script>
<script>
// Hash format: #<bare-code> with optional &key=value pairs after.
// Code stays client-side — never sent to the wrapper origin's server,
// no entry in GitHub Pages logs, no leak via Referer headers.
const [hashCode, ...hashRest] = location.hash.substring(1).split('&');
const hashParams = new URLSearchParams(hashRest.join('&'));
const code = decodeURIComponent(hashCode || '');

function showError(msg) {
  document.getElementById('loadingMsg').style.display = 'none';
  const el = document.getElementById('errorMsg');
  el.textContent = msg; el.style.display = '';
}

(async () => {
  try {
    const r = await api.get('/api/verify?code=' + encodeURIComponent(code), { noAutoRedirect: true });
    if (r.needsPasswordChange) {
      document.getElementById('loadingMsg').style.display = 'none';
      document.getElementById('pwForm').style.display = '';
    } else if (r.ok) {
      if (r.token) window.PortalBridge.setAuth(r.token, !!r.isAdmin);
      location.href = r.redirectTo || '/';
    } else {
      showError('Unexpected response: ' + JSON.stringify(r));
    }
  } catch (e) { showError(e.message || String(e)); }
})();

document.getElementById('pwForm').addEventListener('submit', async e => {
  e.preventDefault();
  if (pw1.value !== pw2.value) { alert('Passwords do not match'); return; }
  try {
    const r = await api.post('/api/verify', { code, password: pw1.value, rememberMe: document.getElementById('rememberMe').checked });
    if (r.ok) {
      if (r.token) window.PortalBridge.setAuth(r.token, !!r.isAdmin);
      location.href = r.redirectTo || '/';
    } else showError('Unexpected response: ' + JSON.stringify(r));
  } catch (e) { showError(e.message || String(e)); }
});
</script>
</body>
</html>
