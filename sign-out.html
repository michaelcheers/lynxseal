<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signing out</title>
<!-- Fonts: SW-proxied, SRI-pinned woff2 (see wrapper sw.js). Never a font CDN
     <link>. Bare portal (no SW) → /__fonts.css 404s → system-font fallback. -->
<link rel="stylesheet" href="/__fonts.css">
<link rel="stylesheet" href="/css/auth.css">
<link rel="stylesheet" href="/css/lynxseal.css">
<script src="/js/config.js"></script>
<script src="/js/portal-bridge.js?v=2"></script>
<script src="/js/api.js"></script>
</head>
<body class="lang-en">
<main class="auth-stage">
<div class="card auth-card" style="text-align:center">
  <div class="spinner"></div>
  <p class="meta">Signing out…</p>
</div>
</main>
<script>
(async () => {
  // Bearer-token sign-out is purely client-side: drop the token. We still
  // hit /api/sign-out to clear the legacy cookie in case the user had one.
  try { await api.post('/api/sign-out', {}); } catch {}
  if (window.PortalBridge) window.PortalBridge.clearAuth();
  location.href = '/sign-in.html';
})();
</script>
</body>
</html>
