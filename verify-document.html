<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!--
  Strict CSP, hardcoded to the exact CDN URLs this page loads. No
  'unsafe-inline' / 'unsafe-eval' for scripts. 'wasm-unsafe-eval' is
  required by argon2-browser (decodes inlined WASM via WebAssembly).
  'unsafe-inline' on style-src covers the page's inline style="…" attrs.
  TODO: when QR-supporting tenants (ATIO, ATIM) come online, add the S3
  presigned-URL host to connect-src so checkQRCode's fetch() works.
-->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'none';
  script-src 'self' 'wasm-unsafe-eval'
    https://cdn.jsdelivr.net/npm/node-forge@1.4.0/dist/forge.min.js
    https://cdn.jsdelivr.net/npm/argon2-browser@1.18.0/dist/argon2-bundled.min.js;
  style-src 'self' 'unsafe-inline'
    https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css;
  connect-src 'self' https://api.lynxseal.com
    https://cdn.jsdelivr.net/npm/pdfjs-dist@1.0.813/build/pdf.combined.js;
  img-src 'self' data:;
  font-src 'self' data:;
  base-uri 'none';
  form-action 'self';
  object-src 'none';
">
<title>Check a digital stamp</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha256-YLGeXaapI0/5IgZopewRJcFXomhRMlYYjugPLSyNjTY=" crossorigin="anonymous" referrerpolicy="no-referrer">
<link rel="stylesheet" href="/css/site.css">
<link rel="stylesheet" href="/css/lynxseal.css">
<script src="/js/config.js"></script>
<script src="/js/portal-bridge.js"></script>
<script src="/js/api.js"></script>
<script src="/js/argon2-init.js?v=1"></script>
<!-- pdfjs-dist 1.0.813, IIFE-wrapper stripped. Loaded dynamically by
     verify-document.js: it fetches the CDN file with the original SRI,
     reapplies the same regex strip, hashes the result, and injects a
     <script integrity="sha256-..."> pointing at /lib/pdfjs-1.0.813-unwrapped.js.
     The browser refuses to execute the self-hosted file if its bytes
     don't match what the runtime regex would produce — tampering on
     either side is caught. See /lib/README.md for full provenance. -->

<!-- node-forge: single UMD bundle, exposes window.forge. Provides ASN.1
     parsing, PKCS#7 (CMS), X.509 cert handling, and SHA-256. Replaces
     the pkijs ESM+bare-imports rabbit hole. -->
<script src="https://cdn.jsdelivr.net/npm/node-forge@1.4.0/dist/forge.min.js" integrity="sha256-2bkHTmhhIA1nbiXc/peInbXo9BULt2bSnEka1wmlG1g=" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>
<main id="mainContent" style="display:none">

<form style="display:none" id="hashForm">
  <input type="hidden" id="hashValue" name="hash">
</form>

<div class="container" style="margin-top:2em">
  <div class="row justify-content-center" style="height:80vh">
    <div class="col-sm-6">
      <div class="card h-100">
        <div class="card-body">
          <h6 style="text-align:center">
            <span class="en-only">Verify the validity of a <span id="assocName1"></span> digitally stamped document</span>
            <span class="fr-only">Vérifiez la validité d'un document tamponné numériquement par <span id="assocName2"></span></span>
          </h6><br>

          <form id="verifyForm">
            <div class="form-group">
              <label for="translationPackage">
                <span class="en-only">Translation Document (PDF)</span>
                <span class="fr-only">Document de traduction (PDF)</span>
              </label>
              <input class="form-control" id="translationPackage" type="file" accept=".pdf">
            </div>
            <div class="form-group" id="certNumberGroup" style="display:none">
              <label for="certNumber">
                <span class="en-only">OR Verification Code (case sensitive)</span>
                <span class="fr-only">OU Code de vérification (sensible à la casse)</span>
              </label>
              <input class="form-control" id="certNumber" name="certNumber" type="text" minlength="18" maxlength="18">
            </div>
            <button class="btn btn-primary">
              <span class="en-only">Check Digital Stamp</span>
              <span class="fr-only">Vérifier le tampon numérique</span>
            </button>
          </form>

          <br><br>
          <div id="signingInfo" style="font-weight:bold;text-align:center"></div>
          <div id="signingInfoDiv">
            <div>
              <div id="signingInfoDetails" style="font-family:Times;font-size:1.5rem"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</main>

<script src="/js/verify-document.js" defer></script>
</body>
</html>
