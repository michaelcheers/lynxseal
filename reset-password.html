<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password</title>
<!-- Fonts: SW-proxied, SRI-pinned woff2 (see wrapper sw.js). Never a font CDN
     <link>. Bare portal (no SW) → /__fonts.css 404s → system-font fallback. -->
<link rel="stylesheet" href="/__fonts.css">
<link rel="stylesheet" href="/css/auth.css">
<link rel="stylesheet" href="/css/lynxseal.css">
<script src="/js/config.js"></script>
<script src="/js/portal-bridge.js?v=2"></script>
<script src="/js/api.js"></script>
</head>
<body class="lang-en">

<header class="topbar">
  <a class="wordmark" id="tenantWordmark" href="/" aria-label="Home">
    <img id="tenantLogo" src="/logo.svg" alt="LynxSeal">
  </a>
  <span class="vr"></span>
  <span class="breadcrumb">Reset password</span>
  <span class="vr powered-sep" hidden></span>
  <a class="powered-by" href="https://lynxseal.com" target="_blank" rel="noopener" hidden>
    Powered by <img src="/logo.svg" alt="LynxSeal" class="powered-logo">
  </a>
</header>

<main class="auth-stage">
<div class="card auth-card">
  <div class="eyebrow" style="margin-bottom:8px">Account</div>
  <h2 class="display-md">Reset your password</h2>
  <p class="sub">Enter your email or phone number and we'll send you a reset link.</p>
  <form id="resetForm">
    <div class="field">
      <label class="label" for="emailI">Email or phone number</label>
      <input id="emailI" name="emailOrPhoneNumber" class="ctrl" required>
    </div>
    <button class="btn accent lg block" type="submit">Request reset email</button>
  </form>
  <div id="result" class="alert alert-info" style="display:none;margin-top:16px">
    Click the link sent to your email address from <strong id="emailSentFrom"></strong> to reset your password.<br><br>
    If you don't receive an email within two hours, contact us at <a id="helpEmail"></a>.
  </div>
</div>
</main>
<script src="/js/ui-shell.js?v=2"></script>
<script>
document.getElementById('resetForm').addEventListener('submit', async e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  try {
    const r = await api.post('/api/reset-password', { emailOrPhoneNumber: fd.get('emailOrPhoneNumber') });
    if (r.needsVerification === 'sms') {
      location.href = '/verify-otp-code.html?id=' + encodeURIComponent(r.otpId);
      return;
    }
    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('result').style.display = '';
    document.getElementById('emailSentFrom').textContent = r.emailSentFrom || '';
    const help = document.getElementById('helpEmail');
    help.textContent = r.technicalHelpEmail || '';
    help.href = 'mailto:' + (r.technicalHelpEmail || '');
  } catch (e) { alert(e.message || e); }
});
</script>
</body>
</html>
