<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password</title>
<link rel="stylesheet" href="/css/lynxseal.css">
<script src="/js/config.js"></script>
<script src="/js/portal-bridge.js"></script>
<script src="/js/api.js"></script>
</head>
<body>
<main>
<div class="col-md-8 mx-auto">
  <h2 style="text-align:center">Reset Account Password</h2>
  <form id="resetForm">
    <div class="form-group">
      <label for="emailI">Email or Phone Number</label>
      <input id="emailI" name="emailOrPhoneNumber" class="form-control" required>
    </div>
    <button class="btn btn-primary" type="submit">Request Reset Email</button>
  </form>
  <div id="result" style="display:none;margin-top:16px">
    Click the link sent to your email address from <strong id="emailSentFrom"></strong> to reset your password.<br>
    If you don't receive an email within two hours, contact us at <a id="helpEmail"></a>.
  </div>
</div>
</main>
<script>
document.getElementById('resetForm').addEventListener('submit', async e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  try {
    const r = await api.post('/api/reset-password', { emailOrPhoneNumber: fd.get('emailOrPhoneNumber') });
    if (r.needsVerification === 'sms') {
      location.href = '/verify-otp-code.html?id=' + encodeURIComponent(r.otpId);
      return;
    }
    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('result').style.display = '';
    document.getElementById('emailSentFrom').textContent = r.emailSentFrom || '';
    const help = document.getElementById('helpEmail');
    help.textContent = r.technicalHelpEmail || '';
    help.href = 'mailto:' + (r.technicalHelpEmail || '');
  } catch (e) { alert(e.message || e); }
});
</script>
</body>
</html>
